# ~/.tmux.conf — lightweight, no plugin manager (tmux 3.6)
# Backup of previous (tpm-based) config: ~/.tmux.conf.bak

### PREFIX & BASICS ###

# Change prefix to ^a instead of default ^b
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Faster command sequences (no delay after ESC — important for vim)
set -sg escape-time 10

# Bigger scrollback
set -g history-limit 50000

# Start windows/panes at 1, renumber on close
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Mouse support (scroll, select panes, resize)
set -g mouse on

# Notify on activity in other windows
setw -g monitor-activity on
set -g visual-activity off

### TERMINAL / COLOR ###

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -g focus-events on

### KEYS: RELOAD & RENAME ###

# Reload config
bind R source-file ~/.tmux.conf \; display-message "tmux config reloaded"

# Rename window
bind r command-prompt -I "#W" "rename-window '%%'"

### SPLITS & WINDOWS (keep current path) ###

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

### PANE NAVIGATION ###

# Seamless vim <-> tmux navigation (replaces christoomey/vim-tmux-navigator).
# If the focused pane is running vim/nvim, send the raw C-h/j/k/l through;
# otherwise move between tmux panes.
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind -n C-h if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind -n C-j if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind -n C-k if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind -n C-l if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'

# Prefix + h/j/k/l also moves between panes (non-seamless fallback)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with repeatable keys (hold prefix)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

### COPY MODE (vim-style, replaces tmux-yank) ###

setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v send -X begin-selection
# macOS system clipboard via pbcopy
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"

### STATUS BAR (native, Catppuccin Frappé–ish colors) ###
# Replaces catppuccin/tmux. Palette: base #303446, surface #414559,
# text #c6d0f5, mauve #ca9ee6, blue #8caaee, green #a6d189, peach #ef9f76.

set -g status-position top
set -g status-interval 5
set -g status-justify left

set -g status-style "bg=#303446,fg=#c6d0f5"

set -g status-left-length 30
set -g status-left "#[bg=#ca9ee6,fg=#303446,bold] #S #[bg=#303446,fg=#ca9ee6]"

set -g status-right-length 80
set -g status-right "#[fg=#8caaee]#(whoami)@#H #[fg=#838ba7]%Y-%m-%d #[fg=#a6d189]%H:%M "

# Windows
setw -g window-status-format "#[fg=#838ba7] #I:#W "
setw -g window-status-current-format "#[bg=#8caaee,fg=#303446,bold] #I:#W "
setw -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=#414559"
set -g pane-active-border-style "fg=#8caaee"

# Messages
set -g message-style "bg=#414559,fg=#c6d0f5"

# Activity highlight in window list
setw -g window-status-activity-style "fg=#ef9f76"
